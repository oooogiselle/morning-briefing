services:
  - type: web
    name: morning-briefing
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 briefing_scheduler.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GMAIL_SENDER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RECIPIENT_EMAIL
        sync: false
      - key: SEND_TIME
        value: "11:00"